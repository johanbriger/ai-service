name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        # Kör bara testerna först för att snabbt få feedback
        run: mvn test
        working-directory: ./backend

      - name: Build Artifact
        # Bygg den färdiga filen (men skippa testerna här eftersom de nyss kördes)
        run: mvn package -DskipTests
        working-directory: ./backend

      - name: Upload Build Artifact (Valfritt)
        # Sparar din .jar-fil så du kan ladda ner den från GitHub om du vill
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar